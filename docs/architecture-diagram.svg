<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 780">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
          </marker>
          <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
          </marker>
          <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <rect width="1000" height="100%" fill="url(#grid)"/>

        <!-- ===== LEGEND ===== -->
        <text x="780" y="40" fill="white" font-size="10" font-weight="600">Legenda</text>
        <rect x="780" y="50" width="14" height="9" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
        <text x="800" y="58" fill="#94a3b8" font-size="8">Frontend</text>
        <rect x="780" y="64" width="14" height="9" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="800" y="72" fill="#94a3b8" font-size="8">Backend</text>
        <rect x="780" y="78" width="14" height="9" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
        <text x="800" y="86" fill="#94a3b8" font-size="8">Dados</text>
        <rect x="780" y="92" width="14" height="9" rx="2" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
        <text x="800" y="100" fill="#94a3b8" font-size="8">Segurança</text>
        <line x1="780" y1="110" x2="794" y2="110" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="800" y="113" fill="#94a3b8" font-size="8">Chamada API</text>
        <rect x="780" y="120" width="14" height="9" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
        <text x="800" y="128" fill="#94a3b8" font-size="8">Externo</text>

        <!-- ===== ROW 1 — USUÁRIO ===== -->
        <rect x="30" y="60" width="140" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="100" y="83" fill="white" font-size="11" font-weight="600" text-anchor="middle">Navegador</text>
        <text x="100" y="98" fill="#94a3b8" font-size="9" text-anchor="middle">Tailwind SPA</text>

        <rect x="30" y="120" width="140" height="35" rx="4" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="100" y="142" fill="#22d3ee" font-size="9" text-anchor="middle">WebSocket ao vivo</text>

        <!-- Arrow: Browser → FastAPI -->
        <line x1="170" y1="85" x2="290" y2="85" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
        <text x="230" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP :8080</text>

        <!-- ===== ROW 2 — FASTAPI ===== -->
        <rect x="300" y="40" width="420" height="100" rx="10" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
        <text x="312" y="58" fill="#34d399" font-size="10" font-weight="600">Servidor FastAPI (127.0.0.1)</text>

        <rect x="310" y="65" width="120" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="370" y="83" fill="white" font-size="10" font-weight="600" text-anchor="middle">Router REST</text>
        <text x="370" y="96" fill="#94a3b8" font-size="8" text-anchor="middle">/api/*</text>

        <rect x="445" y="65" width="120" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="505" y="83" fill="white" font-size="10" font-weight="600" text-anchor="middle">WebSocket</text>
        <text x="505" y="96" fill="#94a3b8" font-size="8" text-anchor="middle">/ws</text>

        <rect x="580" y="65" width="120" height="40" rx="5" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="640" y="83" fill="white" font-size="10" font-weight="600" text-anchor="middle">Static / Templ</text>
        <text x="640" y="96" fill="#94a3b8" font-size="8" text-anchor="middle">HTML + JS</text>

        <!-- ===== ROW 3 — INFRA ===== -->
        <rect x="40" y="180" width="920" height="185" rx="12" fill="rgba(76,29,149,0.08)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="55" y="198" fill="#a78bfa" font-size="10" font-weight="600">Infraestrutura (thread-safe, single instance)</text>

        <!-- Arrow: Router → TaskPool -->
        <line x1="370" y1="105" x2="200" y2="210" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

        <!-- TaskPool + Runner -->
        <rect x="55" y="210" width="180" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="145" y="230" fill="white" font-size="11" font-weight="600" text-anchor="middle">TaskPool</text>
        <text x="145" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">Executor concorrente</text>
        <text x="145" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">State machine</text>

        <!-- Vault -->
        <rect x="55" y="295" width="180" height="55" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="145" y="316" fill="white" font-size="11" font-weight="600" text-anchor="middle">Vault</text>
        <text x="145" y="332" fill="#94a3b8" font-size="9" text-anchor="middle">keyring + Fernet</text>

        <!-- Execution Manager + SQLite -->
        <rect x="290" y="210" width="170" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="375" y="230" fill="white" font-size="11" font-weight="600" text-anchor="middle">Execution Mgr</text>
        <text x="375" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">SQLite</text>
        <text x="375" y="262" fill="#94a3b8" font-size="9" text-anchor="middle">.local/executions.db</text>

        <!-- Logger -->
        <rect x="290" y="295" width="170" height="55" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="375" y="316" fill="white" font-size="11" font-weight="600" text-anchor="middle">Logger</text>
        <text x="375" y="332" fill="#94a3b8" font-size="9" text-anchor="middle">structlog → JSON + WS</text>

        <!-- arrows from TaskPool -->
        <line x1="235" y1="245" x2="288" y2="245" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="145" y1="280" x2="145" y2="293" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="375" y1="280" x2="375" y2="293" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

        <!-- ===== ROW 4 — AUTOMAÇÃO ===== -->
        <rect x="510" y="210" width="430" height="140" rx="10" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
        <text x="522" y="228" fill="#22d3ee" font-size="10" font-weight="600">Automação (Playwright)</text>

        <rect x="530" y="238" width="180" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="620" y="258" fill="white" font-size="11" font-weight="600" text-anchor="middle">Page Objects</text>
        <text x="620" y="274" fill="#94a3b8" font-size="8" text-anchor="middle">Template matching + OCR</text>

        <rect x="740" y="238" width="180" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="830" y="258" fill="white" font-size="11" font-weight="600" text-anchor="middle">Tasks</text>
        <text x="830" y="274" fill="#94a3b8" font-size="8" text-anchor="middle">GeracaoRelatorio</text>

        <!-- Arrow: TaskPool → Automation -->
        <line x1="235" y1="245" x2="528" y2="265" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
        <text x="380" y="263" fill="#94a3b8" font-size="8" text-anchor="middle">executa</text>

        <!-- Arrow: Vault → Automation (credenciais) -->
        <line x1="145" y1="350" x2="620" y2="295" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
        <text x="350" y="358" fill="#fb7185" font-size="8">credenciais</text>

        <!-- ===== ROW 5 — EXTERNO ===== -->
        <rect x="530" y="380" width="250" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="655" y="403" fill="white" font-size="11" font-weight="600" text-anchor="middle">Terminal Server</text>
        <text x="655" y="418" fill="#94a3b8" font-size="9" text-anchor="middle">ERP Senior (remoto)</text>

        <line x1="620" y1="295" x2="655" y2="378" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
        <text x="655" y="360" fill="#94a3b8" font-size="8" text-anchor="middle">navega + preenche</text>

        <!-- GitHub -->
        <rect x="530" y="450" width="250" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="655" y="473" fill="white" font-size="11" font-weight="600" text-anchor="middle">GitHub Releases</text>
        <text x="655" y="488" fill="#94a3b8" font-size="9" text-anchor="middle">Auto-update</text>

        <line x1="375" y1="350" x2="655" y2="448" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-rose)"/>
        <text x="480" y="430" fill="#fb7185" font-size="8">check → download</text>

        <!-- ===== ROW 6 — SISTEMA ===== -->
        <rect x="55" y="380" width="400" height="45" rx="6" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="255" y="400" fill="#fb7185" font-size="10" font-weight="600" text-anchor="middle">Serviços Windows</text>
        <text x="255" y="415" fill="#94a3b8" font-size="8" text-anchor="middle">Mutex · keyring · named pipe · port.txt · API token</text>

        <!-- ===== SUMMARY ===== -->
        <text x="55" y="460" fill="white" font-size="11" font-weight="600">Stack</text>
        <text x="55" y="478" fill="#94a3b8" font-size="9">Python 3.14 · FastAPI · Playwright · PyInstaller</text>
        <text x="55" y="493" fill="#94a3b8" font-size="9">OpenCV · Tesseract · structlog · cryptography · keyring</text>
        <text x="55" y="508" fill="#94a3b8" font-size="9">Typer · httpx · uvicorn · Pydantic · pytest · ruff · pyright</text>

        <text x="55" y="540" fill="white" font-size="11" font-weight="600">Arquitetura</text>
        <text x="55" y="558" fill="#94a3b8" font-size="9">Single process · Clean-ish layers · injeção de dependência</text>
        <text x="55" y="573" fill="#94a3b8" font-size="9">State machine (IDLE→RUNNING↔PAUSED→COMPLETED|FAILED|CANCELLED)</text>
        <text x="55" y="588" fill="#94a3b8" font-size="9">WebSocket pub-sub · SQLite WAL · Fernet simétrico</text>

        <text x="55" y="620" fill="white" font-size="11" font-weight="600">Segurança</text>
        <text x="55" y="638" fill="#94a3b8" font-size="9">localhost-only · token Bearer por processo · credenciais cifradas</text>
        <text x="55" y="653" fill="#94a3b8" font-size="9">senha nunca em plaintext na API/CLI</text>
      </svg>
