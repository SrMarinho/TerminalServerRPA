repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned below 0.15: ruff-format 0.15.x rewrites `except (A, B):` into the
    # invalid Python-2 form `except A, B:`. 0.14.x is unaffected.
    rev: v0.14.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright src
        language: system
        types: [python]
        pass_filenames: false
