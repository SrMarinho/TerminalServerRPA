name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  UV_VERSION: "0.6"

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run ruff check src/

  typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run pyright src/

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run pytest --tb=short -q
      - run: uv run python -m playwright install chromium 2>/dev/null || echo "browser not available in CI — skipping"

  build:
    if: github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - run: uv run pyinstaller main.spec
      - uses: actions/upload-artifact@v4
        with:
          name: TerminalServerRPA
          path: dist/
          retention-days: 7
