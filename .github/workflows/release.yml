name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build executable (onedir)
        run: uv run pyinstaller main.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe" }
          & $iscc /DAppVersion=$version installer.iss

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist\TerminalServerRPA_Setup.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  TerminalServerRPA_Setup.exe" | Out-File -Encoding ascii "dist\TerminalServerRPA_Setup.exe.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TerminalServerRPA ${{ github.ref_name }}
          body: |
            ## TerminalServerRPA ${{ github.ref_name }}

            ### Instalação

            1. Baixe `TerminalServerRPA_Setup.exe`
            2. Execute o installer (não requer administrador)
            3. O app abre automaticamente após a instalação
            4. Atualizações futuras são aplicadas automaticamente pelo próprio app

            ### Assets

            - `TerminalServerRPA_Setup.exe` — Installer (instalação inicial)
            - `TerminalServerRPA_Setup.exe.sha256` — Checksum SHA256
          files: |
            dist/TerminalServerRPA_Setup.exe
            dist/TerminalServerRPA_Setup.exe.sha256
