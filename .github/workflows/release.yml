name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6"
          python-version: "3.14"

      - run: uv sync --frozen
      - run: uv run pyinstaller main.spec
      - run: uv run pyinstaller updater.spec

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TerminalServerRPA ${{ github.ref_name }}
          body: |
            ## TerminalServerRPA ${{ github.ref_name }}

            ### 📥 Assets
            - `TerminalServerRPA.exe` — Main application (no console window)
            - `TerminalServerRPA-updater.exe` — Update helper (console window)

            ### 🚀 How to use
            1. Download `TerminalServerRPA.exe`
            2. Run it — the app starts a local web server and opens your browser
            3. Future updates are applied automatically via `POST /api/update`
          files: |
            dist/TerminalServerRPA.exe
            dist/TerminalServerRPA-updater.exe
