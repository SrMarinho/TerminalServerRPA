<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>senior-rpa</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 font-sans p-8">
<h1 class="text-cyan-400 text-2xl font-bold mb-6">senior-rpa</h1>

<div class="bg-slate-800 rounded-xl p-6 mb-6 border border-slate-700">
  <h2 class="text-slate-400 text-sm font-bold uppercase tracking-wider mb-4">Credentials</h2>
  <form id="credForm">
    <label class="block text-slate-400 text-sm mb-1" for="service">Service</label>
    <input id="service" name="service" placeholder="e.g. erp-system" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-slate-200 mb-3 focus:outline-none focus:border-cyan-400">
    <label class="block text-slate-400 text-sm mb-1" for="username">Username</label>
    <input id="username" name="username" placeholder="e.g. admin" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-slate-200 mb-3 focus:outline-none focus:border-cyan-400">
    <label class="block text-slate-400 text-sm mb-1" for="password">Password</label>
    <input id="password" type="password" name="password" placeholder="password" required class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-md text-slate-200 mb-3 focus:outline-none focus:border-cyan-400">
    <button type="submit" class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-semibold px-4 py-2 rounded-md">Save</button>
  </form>
  <div id="credList" class="mt-4"></div>
</div>

<div class="bg-slate-800 rounded-xl p-6 mb-6 border border-slate-700">
  <h2 class="text-slate-400 text-sm font-bold uppercase tracking-wider mb-4">Tasks</h2>
  <div id="taskList" class="flex gap-2 flex-wrap"></div>
  <div class="mt-4 flex gap-2">
    <button id="btnPause" class="bg-slate-600 hover:bg-slate-500 text-slate-200 font-semibold px-4 py-2 rounded-md disabled:opacity-50 disabled:cursor-not-allowed" disabled onclick="pauseTask()">Pause</button>
    <button id="btnResume" class="bg-slate-600 hover:bg-slate-500 text-slate-200 font-semibold px-4 py-2 rounded-md disabled:opacity-50 disabled:cursor-not-allowed" disabled onclick="resumeTask()">Resume</button>
    <button id="btnCancel" class="bg-red-500 hover:bg-red-400 text-white font-semibold px-4 py-2 rounded-md disabled:opacity-50 disabled:cursor-not-allowed" disabled onclick="cancelTask()">Cancel</button>
  </div>
  <div class="mt-3">Status: <span id="taskStatus" class="rounded-full px-3 py-1 text-xs font-bold uppercase bg-slate-600 text-slate-200">idle</span></div>
</div>

<div class="bg-slate-800 rounded-xl p-6 mb-6 border border-slate-700">
  <h2 class="text-slate-400 text-sm font-bold uppercase tracking-wider mb-4">Log</h2>
  <div id="log" class="bg-slate-950 border border-slate-700 rounded-md p-3 h-48 overflow-y-auto font-mono text-xs"></div>
</div>

<div id="toast" class="fixed bottom-4 right-4 px-4 py-3 rounded-md font-semibold transition-all duration-300 translate-y-32 bg-green-500 text-green-950"></div>

<script>
const API = '';

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(API + path, opts);
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  return res.status === 204 ? null : res.json();
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'fixed bottom-4 right-4 px-4 py-3 rounded-md font-semibold transition-all duration-300 translate-y-32' + (isError ? ' bg-red-500 text-white' : ' bg-green-500 text-green-950');
  setTimeout(() => el.className = el.className.replace('translate-y-0', 'translate-y-32'), 50);
  requestAnimationFrame(() => {
    el.className = el.className.replace('translate-y-32', 'translate-y-0');
    setTimeout(() => el.className = el.className.replace('translate-y-0', 'translate-y-32'), 3000);
  });
}

async function loadCredentials() {
  try {
    const data = await api('GET', '/api/credentials');
    document.getElementById('credList').innerHTML = data.length
      ? data.map(c => `<div class="flex justify-between items-center py-2 border-b border-slate-700 last:border-b-0"><span class="text-cyan-400 font-semibold">${esc(c.service)}</span><span class="text-slate-400 text-sm">${esc(c.usernames.join(', '))}</span><button class="bg-red-500 hover:bg-red-400 text-white text-sm px-3 py-1 rounded-md" onclick="deleteCred('${esc(c.service)}')">Delete</button></div>`).join('')
      : '<div class="text-slate-500 py-2">No credentials stored.</div>';
  } catch (e) { toast('Failed to load credentials', true); }
}

async function deleteCred(service) {
  try { await api('DELETE', '/api/credentials/' + encodeURIComponent(service)); toast('Deleted'); loadCredentials(); }
  catch (e) { toast('Delete failed', true); }
}

document.getElementById('credForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const data = { service: document.getElementById('service').value, username: document.getElementById('username').value, password: document.getElementById('password').value };
  try { await api('POST', '/api/credentials', data); toast('Saved'); e.target.reset(); loadCredentials(); }
  catch (err) { toast('Save failed: ' + err.message, true); }
});

async function loadTasks() {
  try {
    const data = await api('GET', '/api/tasks');
    document.getElementById('taskList').innerHTML = data.available.map(t =>
      `<button class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-semibold px-4 py-2 rounded-md text-sm" onclick="runTask('${esc(t)}')">${esc(t)}</button>`
    ).join('');
    updateStatus(data.current_status);
  } catch (e) { toast('Failed to load tasks', true); }
}

async function runTask(name) {
  try { await api('POST', '/api/run/' + encodeURIComponent(name)); toast('Task started'); loadTasks(); }
  catch (e) { toast('Run failed: ' + e.message, true); }
}

async function pauseTask() { try { await api('POST', '/api/tasks/pause'); toast('Paused'); loadTasks(); } catch (e) { toast(e.message, true); } }
async function resumeTask() { try { await api('POST', '/api/tasks/resume'); toast('Resumed'); loadTasks(); } catch (e) { toast(e.message, true); } }
async function cancelTask() { try { await api('POST', '/api/tasks/cancel'); toast('Cancelling'); loadTasks(); } catch (e) { toast(e.message, true); } }

function updateStatus(s) {
  const el = document.getElementById('taskStatus');
  el.textContent = s;
  const colors = { idle: 'bg-slate-600 text-slate-200', running: 'bg-green-500 text-green-950', paused: 'bg-yellow-500 text-yellow-950', completed: 'bg-green-500 text-green-950', failed: 'bg-red-500 text-white', cancelled: 'bg-slate-500 text-white' };
  el.className = 'rounded-full px-3 py-1 text-xs font-bold uppercase ' + (colors[s] || colors.idle);
  document.getElementById('btnPause').disabled = s !== 'running';
  document.getElementById('btnResume').disabled = s !== 'paused';
  document.getElementById('btnCancel').disabled = !['running','paused'].includes(s);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadCredentials();
loadTasks();
</script>
</body>
</html>
